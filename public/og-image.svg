<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LocalBoard</title>
  <desc id="desc">LocalBoard turns a business website into a Bangalore street campaign.</desc>
  <rect width="1200" height="630" fill="#F7F1E8"/>
  <circle cx="1030" cy="120" r="170" fill="#DE5B2A" fill-opacity="0.12"/>
  <circle cx="120" cy="560" r="220" fill="#1E9AC0" fill-opacity="0.10"/>
  <g transform="translate(96 96)">
    <rect width="96" height="96" rx="26" fill="#FFFFFF"/>
    <rect x="22" y="20" width="48" height="48" rx="12" fill="#2A231F"/>
    <circle cx="68" cy="68" r="14" fill="#DE5B2A" stroke="#FFFFFF" stroke-width="8"/>
  </g>
  <text x="216" y="156" fill="#2A231F" font-family="'Space Grotesk', Inter, Arial, sans-serif" font-size="56" font-weight="500" letter-spacing="-2.8">localboard</text>
  <text x="96" y="310" fill="#2A231F" font-family="'Space Grotesk', Inter, Arial, sans-serif" font-size="72" font-weight="400" letter-spacing="-3.8">Website in.</text>
